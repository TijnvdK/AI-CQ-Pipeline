name: Run Pipeline Task Tests
on:
  pull_request:
    paths:
      - "pipeline/**"
  push:
    branches:
      - main
    paths:
      - "pipeline/**"
jobs:
  retrieve:
    name: Retrieve Pipeline Components
    runs-on: ubuntu-latest
    outputs:
      components: ${{ steps.retrieve.outputs.components }}
    steps:
      - uses: actions/checkout@v6
      - name: Retrieve Pipeline Components and their tests
        id: retrieve
        run: |
          components=$(find pipeline -mindepth 1 -maxdepth 1 -type d \
            -exec test -d {}/tests \; -print | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "components=$components" >> $GITHUB_OUTPUT
  test:
    name: Run Tests of ${{ matrix.component }}
    needs: retrieve
    if: ${{ needs.retrieve.outputs.components != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: ${{ fromJson(needs.retrieve.outputs.components) }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            ${{ matrix.component }}/requirements.txt
            ${{ matrix.component }}/requirements-dev.txt
      - name: Install dependencies
        working-directory: ${{ matrix.component }}
        run: |
          python -m pip install --upgrade pip
          [ -f requirements.txt ] && pip install -r requirements.txt || true
          [ -f requirements-dev.txt ] && pip install -r requirements-dev.txt || true
          pip install pytest pytest-cov
      - name: Run tests
        id: run_tests
        working-directory: ${{ matrix.component }}
        env:
          PYTHONPATH: src
        run: |
          pytest tests/ --tb=short --cov=src --cov-report=term-missing -v 2>&1 | tee pytest_output.txt
          COVERAGE=$(grep 'TOTAL' pytest_output.txt | awk '{print $NF}')
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `📊 Coverage for \`${{ matrix.component }}\`: **${{ steps.run_tests.outputs.coverage }}**`
            })
