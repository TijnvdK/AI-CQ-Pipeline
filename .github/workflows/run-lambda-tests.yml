name: Run Lambda Tests
on:
  pull_request:
    paths:
      - "lambdas/**"
  push:
    branches:
      - main
    paths:
      - "lambdas/**"
jobs:
  retrieve:
    name: Retrieve Lambdas and their tests
    runs-on: ubuntu-latest
    outputs:
      lambdas: ${{ steps.retrieve.outputs.lambdas }}
    steps:
      - uses: actions/checkout@v6
      - name: Retrieve Lambdas and their tests
        id: retrieve
        run: |
          lambdas=$(find lambdas -mindepth 1 -maxdepth 1 -type d \
            -exec test -d {}/tests \; -print | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "lambdas=$lambdas" >> $GITHUB_OUTPUT
  test:
    name: Run Tests of ${{ matrix.lambda }}
    needs: retrieve
    if: ${{ needs.retrieve.outputs.lambdas != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lambda: ${{ fromJson(needs.retrieve.outputs.lambdas) }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            ${{ matrix.lambda }}/requirements.txt
            ${{ matrix.lambda }}/requirements-dev.txt
      - name: Install dependencies
        working-directory: ${{ matrix.lambda }}
        run: |
          python -m pip install --upgrade pip
          [ -f requirements.txt ] && pip install -r requirements.txt || true
          [ -f requirements-dev.txt ] && pip install -r requirements-dev.txt || true
          pip install pytest pytest-cov
      - name: Run tests
        working-directory: ${{ matrix.lambda }}
        env:
          PYTHONPATH: src
        run: |
          pytest tests/ --tb=short --cov=src --cov-report=term-missing --cov-report=xml:coverage.xml -v
      - name: Upload coverage report
        uses: actions/upload-artifact@v6
        with:
          name: coverage-${{ strategy.job-index }}
          path: ${{ matrix.lambda }}/coverage.xml
          retention-days: 7
